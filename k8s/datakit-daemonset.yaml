# TrueWatch's collector agent ("DataKit") runs as a DaemonSet so every AKS
# node gets its own instance collecting host metrics, container logs, and
# receiving OTLP traces forwarded from app pods on that same node.
#
# The truewatch-credentials Secret this DaemonSet reads from is NOT defined
# here on purpose -- it's created directly with `kubectl create secret`
# (see RUNBOOK.md step 8) using your real Dataway URL (with token embedded
# as a query param, e.g. https://us1-openway.truewatch.com?token=<yourtoken>).
# Keeping it out of this file means `kubectl apply -f` on this DaemonSet can
# never accidentally overwrite the real secret with a placeholder.
#
# The OpenTelemetry receiver is NOT one of the simple inputs (cpu/mem/disk/
# etc.) that can be turned on purely via ENV_DEFAULT_ENABLED_INPUTS -- it
# needs an actual config file present under conf.d/opentelemetry/, so we
# supply one via this ConfigMap and mount it into the container below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: datakit-opentelemetry-conf
  namespace: todo-demo
data:
  opentelemetry.conf: |
    [[inputs.opentelemetry]]
      [inputs.opentelemetry.http]
        enable = true
        http_status_ok = 200
        trace_api = "/otel/v1/trace"
        metric_api = "/otel/v1/metric"
      [inputs.opentelemetry.grpc]
        trace_enable = false
        metric_enable = false
        addr = "127.0.0.1:4317"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: datakit
  namespace: todo-demo
  labels:
    app: datakit
spec:
  selector:
    matchLabels:
      app: datakit
  template:
    metadata:
      labels:
        app: datakit
    spec:
      # hostNetwork lets DataKit bind directly to the node's network
      # namespace, which is how app pods reach it via HOST_IP:9529 (see
      # k8s/deployment.yaml) without an extra Service/ClusterIP hop.
      hostNetwork: true
      hostPID: true
      containers:
        - name: datakit
          image: pubrepo.guance.com/datakit/datakit:1.32.0
          env:
            - name: ENV_DATAWAY
              valueFrom:
                secretKeyRef:
                  name: truewatch-credentials
                  key: dataway-url
            - name: ENV_GLOBAL_HOST_TAGS
              value: "host=__datakit_hostname,cluster=aks-todo-demo"
            - name: ENV_DEFAULT_ENABLED_INPUTS
              # Baseline host metrics/container collection. The opentelemetry
              # input is enabled separately by the presence of its mounted
              # conf file below, not through this list.
              value: "cpu,mem,disk,net,hostobject,container"
            - name: ENV_HTTP_LISTEN
              # DataKit's HTTP API (including the OTLP receiver) defaults to
              # "localhost:9529", which only accepts connections from
              # processes sharing its exact network namespace. App pods
              # reach it via the node's real IP (see HOST_IP in
              # k8s/deployment.yaml), so it must listen on all interfaces.
              value: "0.0.0.0:9529"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: proc
              mountPath: /rootfs/proc
              readOnly: true
            - name: sys
              mountPath: /rootfs/sys
              readOnly: true
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: containerd-sock
              mountPath: /var/run/containerd/containerd.sock
            - name: otel-conf
              mountPath: /usr/local/datakit/conf.d/opentelemetry/opentelemetry.conf
              subPath: opentelemetry.conf
      volumes:
        - name: otel-conf
          configMap:
            name: datakit-opentelemetry-conf
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
        - name: containerd-sock
          hostPath:
            path: /var/run/containerd/containerd.sock
      tolerations:
        # Ensure DataKit runs on every node regardless of taints, since it
        # needs to observe all nodes, not just "schedulable for apps" ones.
        - operator: Exists
