# Builds the app image, pushes it to ACR, then updates the AKS Deployment
# to use the new tag. Runs after Terraform has applied (infra must exist
# first), triggered on push to main affecting app/ or k8s/.
name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
  workflow_dispatch: {} # allows manually re-running the build/deploy from the Actions tab

permissions:
  id-token: write
  contents: read

env:
  # Set these repo variables (Settings > Secrets and variables > Actions >
  # Variables) once Terraform has created the ACR + AKS cluster.
  ACR_NAME: ${{ vars.ACR_LOGIN_SERVER }} # e.g. acrtododemoxxxxxx.azurecr.io
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  IMAGE_NAME: todo-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        # Uses the OIDC-derived az session token rather than ACR admin
        # credentials -- the GitHub Actions identity needs AcrPush role on
        # the registry (see RUNBOOK.md for the role assignment command).
        run: az acr login --name "${ACR_NAME%%.*}"

      - name: Build and push image
        working-directory: app
        run: |
          IMAGE_TAG="${ACR_NAME}/${IMAGE_NAME}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$AKS_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Apply k8s manifests
        # Namespace/Service rarely change; applying them each run is
        # idempotent and cheap. deployment.yaml's placeholder image is
        # substituted with the real just-pushed tag before applying, so we
        # never briefly schedule the placeholder (which would ImagePullBackOff).
        # The DataKit DaemonSet + Secret are deliberately NOT applied here --
        # the Secret holds real TrueWatch credentials created manually
        # in-cluster (see RUNBOOK.md), and CI must never overwrite it with
        # datakit-daemonset.yaml's placeholder values.
        run: |
          kubectl apply -f k8s/namespace.yaml
          sed "s#todoapp.azurecr.io/todo-app:latest#$IMAGE_TAG#" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/todo-app -n todo-demo --timeout=120s
